{% extends "base.html" %}

{% block content %}
<div class="page">
  <h1>Bill Splitter</h1>
  <p>Upload a bill photo to get started</p>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/sessions" enctype="multipart/form-data" class="form">
    <div class="form-group">
      <label for="host_name">Your name</label>
      <input type="text" id="host_name" name="host_name" required>
    </div>

    <div class="form-group">
      <label for="file">Upload bill photo</label>
      <input type="file" id="file" name="file" accept="image/*" capture="environment" required>
    </div>

    <button type="submit">Create Session</button>
  </form>
</div>
{% endblock %}
